services:
  - type: web
    name: movie-booking-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /q/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: movie-booking-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: movie-booking-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: movie-booking-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: movie-booking-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: movie-booking-db
          property: password
      - key: JWT_ISSUER
        value: movie-booking-api
      - key: JWT_ACCESS_EXPIRY
        value: 900
      - key: JWT_REFRESH_EXPIRY
        value: 604800

databases:
  - name: movie-booking-db
    databaseName: movie_booking
    plan: free
