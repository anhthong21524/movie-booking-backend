# =============================================================================
# Application
# =============================================================================
quarkus.application.name=movie-booking-api

# =============================================================================
# HTTP
# =============================================================================
quarkus.http.port=8080
quarkus.rest.path=/api/v1

# =============================================================================
# DataSource - PostgreSQL
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:movie_booking}

# =============================================================================
# Hibernate ORM
# =============================================================================
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# =============================================================================
# Liquibase
# =============================================================================
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.yaml

# =============================================================================
# JWT
# =============================================================================
mp.jwt.verify.issuer=${JWT_ISSUER:movie-booking-api}
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

quarkus.smallrye-jwt.enabled=true

jwt.issuer=${JWT_ISSUER:movie-booking-api}
jwt.access-token.expiry=${JWT_ACCESS_EXPIRY:900}
jwt.refresh-token.expiry=${JWT_REFRESH_EXPIRY:604800}

# =============================================================================
# OpenAPI / Swagger
# =============================================================================
quarkus.smallrye-openapi.info-title=Movie Booking API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for browsing movies, viewing showtimes, reserving seats, and managing bookings.
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# =============================================================================
# Health
# =============================================================================
quarkus.smallrye-health.root-path=/q/health

# =============================================================================
# Vert.x tuning (slow disk I/O on free-tier hosting)
# =============================================================================
quarkus.vertx.max-event-loop-execute-time=5S
quarkus.vertx.warning-exception-time=5S

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) %s%e%n

# =============================================================================
# Dev profile overrides
# =============================================================================
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.level=DEBUG

# =============================================================================
# Test profile overrides
# =============================================================================
%test.quarkus.datasource.username=postgres
%test.quarkus.datasource.password=postgres
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/movie_booking_test
